server.port=${SPRING_PORT:8080}

# Redis cache
spring.cache.type=redis
spring.redis.host=${REDIS_HOST:redis-forum-api}
spring.redis.port=${REDIS_PORT:6379}

# MySQL datasource
spring.datasource.driver-class-name=com.mysql.jdbc.Driver
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:mysql-forum-api}:3306/${MYSQL_DB:forum}
spring.datasource.username=${MYSQL_USER:forum}
spring.datasource.password=${MYSQL_PASSWORD:Bk55yc1u0eiqga6e}

# JPA MySQL
spring.jpa.database=MYSQL
spring.jpa.database-platform=org.hibernate.dialect.MySQL5InnoDBDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.format_sql=true

# Actuator / Prometheus
management.endpoint.health.show-details=always
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.metrics.enable.jvm=true
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=app-forum-api

# JWT
forum.jwt.secret=${JWT_SECRET:change_this_secret}
forum.jwt.expiration=${JWT_EXPIRATION:86400000}

# App info
info.app.name=@project.name@
info.app.description=@project.description@
info.app.version=@project.version@
info.app.encoding=@project.build.sourceEncoding@
info.app.java.version=@java.version@
